<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 350" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0c" />
      <stop offset="100%" stop-color="#141418" />
    </linearGradient>

    <!-- Glowing gradients -->
    <linearGradient id="glow-cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <linearGradient id="glow-green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38ef7d" />
      <stop offset="100%" stop-color="#11998e" />
    </linearGradient>
    <linearGradient id="glow-orange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff9900" />
      <stop offset="100%" stop-color="#ff5500" />
    </linearGradient>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="350" rx="16" fill="url(#bg-grad)" stroke="#222" stroke-width="2" />

  <!-- Connector Lines -->
  <g stroke="#333" stroke-width="2" fill="none">
    <!-- Horizontal spine -->
    <line x1="80" y1="175" x2="920" y2="175" />
    <!-- Fork to browser check -->
    <path d="M 540 175 L 540 85 L 680 85 L 680 135" />
    <!-- Flow from browser check back to main line -->
    <path d="M 680 215 L 680 265 L 820 265 L 820 215" />
  </g>

  <g stroke-width="1.5" fill="none" opacity="0.4">
    <line x1="80" y1="175" x2="920" y2="175" stroke="url(#glow-cyan)" />
    <path d="M 540 175 L 540 85 L 680 85 L 680 135" stroke="url(#glow-orange)" />
  </g>

  <!-- Step 1: Input -->
  <g transform="translate(40, 135)" filter="url(#shadow)">
    <rect width="100" height="80" rx="8" fill="#18181f" stroke="#333" stroke-width="1.5" />
    <rect width="100" height="4" rx="2" fill="#888" />
    <text x="50" y="35" fill="#fff" font-family="system-ui, sans-serif" font-weight="bold" font-size="12" text-anchor="middle">1. INPUT</text>
    <text x="50" y="55" fill="#888" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">apps.csv</text>
  </g>

  <!-- Step 2: Planner -->
  <g transform="translate(190, 135)" filter="url(#shadow)">
    <rect width="110" height="80" rx="8" fill="#18181f" stroke="#333" stroke-width="1.5" />
    <rect width="110" height="4" rx="2" fill="url(#glow-cyan)" />
    <text x="55" y="32" fill="#fff" font-family="system-ui, sans-serif" font-weight="bold" font-size="12" text-anchor="middle">2. PLANNER</text>
    <text x="55" y="50" fill="#aaa" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">Formulates API</text>
    <text x="55" y="65" fill="#aaa" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">search terms</text>
  </g>

  <!-- Step 3: Research Agents -->
  <g transform="translate(350, 135)" filter="url(#shadow)">
    <rect width="120" height="80" rx="8" fill="#18181f" stroke="#333" stroke-width="1.5" />
    <rect width="120" height="4" rx="2" fill="url(#glow-cyan)" />
    <text x="60" y="32" fill="#fff" font-family="system-ui, sans-serif" font-weight="bold" font-size="12" text-anchor="middle">3. EXTRACTORS</text>
    <text x="60" y="50" fill="#aaa" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">Auth, MCP &amp;</text>
    <text x="60" y="65" fill="#aaa" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">Buildability classification</text>
  </g>

  <!-- Step 4: Confidence Check (Decision Gate) -->
  <g transform="translate(510, 135)" filter="url(#shadow)">
    <polygon points="60,0 120,40 60,80 0,40" fill="#2d1b10" stroke="url(#glow-orange)" stroke-width="1.5" />
    <text x="60" y="38" fill="#fff" font-family="system-ui, sans-serif" font-weight="bold" font-size="11" text-anchor="middle">CONFIDENCE</text>
    <text x="60" y="52" fill="#ff9900" font-family="system-ui, sans-serif" font-weight="bold" font-size="11" text-anchor="middle">&gt; 90% ?</text>
  </g>

  <!-- Branch Step: Deep Browser Scraper (If confidence < 90%) -->
  <g transform="translate(620, 135)" filter="url(#shadow)">
    <rect width="120" height="80" rx="8" fill="#18181f" stroke="#ff9900" stroke-width="1.5" />
    <text x="60" y="30" fill="#ff9900" font-family="system-ui, sans-serif" font-weight="bold" font-size="11" text-anchor="middle">BROWSER SEARCH</text>
    <text x="60" y="50" fill="#aaa" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">Deep scrapes documentation</text>
    <text x="60" y="65" fill="#aaa" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">and verifies details</text>
  </g>

  <!-- Step 5: Verification Gate & Cross-Check -->
  <g transform="translate(770, 135)" filter="url(#shadow)">
    <rect width="110" height="80" rx="8" fill="#18181f" stroke="#333" stroke-width="1.5" />
    <rect width="110" height="4" rx="2" fill="url(#glow-green)" />
    <text x="55" y="32" fill="#fff" font-family="system-ui, sans-serif" font-weight="bold" font-size="12" text-anchor="middle">5. VERIFIER</text>
    <text x="55" y="50" fill="#aaa" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">Manual sample check</text>
    <text x="55" y="65" fill="#38ef7d" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">accuracy verified</text>
  </g>

  <!-- Step 6: Final Output -->
  <g transform="translate(910, 135)" filter="url(#shadow)">
    <rect width="65" height="80" rx="8" fill="#15231c" stroke="url(#glow-green)" stroke-width="1.5" />
    <text x="32" y="35" fill="#fff" font-family="system-ui, sans-serif" font-weight="bold" font-size="11" text-anchor="middle">OUTPUT</text>
    <text x="32" y="52" fill="#38ef7d" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">dataset.json</text>
    <text x="32" y="65" fill="#38ef7d" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">index.html</text>
  </g>

  <!-- Flow Arrows -->
  <g fill="#888">
    <path d="M 155 175 L 147 171 L 147 179 Z" />
    <path d="M 315 175 L 307 171 L 307 179 Z" />
    <path d="M 485 175 L 477 171 L 477 179 Z" />
    <path d="M 755 175 L 747 171 L 747 179 Z" />
    <path d="M 895 175 L 887 171 L 887 179 Z" />
    
    <!-- Decisions paths text -->
    <text x="495" y="115" fill="#ff9900" font-family="system-ui, sans-serif" font-weight="bold" font-size="11">No (Low confidence)</text>
    <text x="548" y="200" fill="#38ef7d" font-family="system-ui, sans-serif" font-weight="bold" font-size="11">Yes</text>
  </g>
</svg>
