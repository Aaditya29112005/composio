<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0c" />
      <stop offset="100%" stop-color="#141418" />
    </linearGradient>

    <!-- Glow Gradients -->
    <linearGradient id="cyan-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="1" />
      <stop offset="100%" stop-color="#4facfe" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f355da" stop-opacity="1" />
      <stop offset="100%" stop-color="#7000ff" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="gold-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffb703" stop-opacity="1" />
      <stop offset="100%" stop-color="#fb8500" stop-opacity="1" />
    </linearGradient>

    <!-- Filters for Neon Glow Effect -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="500" rx="16" fill="url(#bg-grad)" stroke="#222" stroke-width="2" />

  <!-- Connection Lines (Underneath cards) -->
  <g stroke="#333" stroke-width="2" fill="none">
    <!-- Main spine -->
    <line x1="500" y1="100" x2="500" y2="400" />
    <!-- Branches -->
    <path d="M 500 180 L 220 180 L 220 230" />
    <path d="M 500 180 L 780 180 L 780 230" />
    <path d="M 220 330 L 220 360 L 500 360" />
    <path d="M 780 330 L 780 360 L 500 360" />
  </g>

  <!-- Glowing Highlights -->
  <g fill="none" stroke-width="1.5">
    <path d="M 500 180 L 220 180 L 220 230" stroke="url(#cyan-glow)" filter="url(#glow-cyan)" opacity="0.4" />
    <path d="M 500 180 L 780 180 L 780 230" stroke="url(#purple-glow)" filter="url(#glow-purple)" opacity="0.4" />
    <line x1="500" y1="100" x2="500" y2="400" stroke="url(#cyan-glow)" filter="url(#glow-cyan)" opacity="0.3" />
  </g>

  <!-- Central Hub: Planner Agent -->
  <g transform="translate(375, 40)">
    <rect width="250" height="80" rx="8" fill="#18181f" stroke="url(#cyan-glow)" stroke-width="2" filter="url(#glow-cyan)" />
    <text x="125" y="32" fill="#fff" font-family="system-ui, sans-serif" font-weight="bold" font-size="16" text-anchor="middle">PLANNING AGENT</text>
    <text x="125" y="55" fill="#888" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">Formulates Search Strategy &amp; Tasks</text>
    <circle cx="125" cy="80" r="4" fill="#00f2fe" />
  </g>

  <!-- Left Branch: Research & Scraping Agents -->
  <g transform="translate(100, 230)">
    <rect width="240" height="100" rx="8" fill="#18181f" stroke="#333" stroke-width="1.5" />
    <rect width="240" height="6" rx="3" fill="url(#cyan-glow)" />
    <text x="120" y="30" fill="#fff" font-family="system-ui, sans-serif" font-weight="bold" font-size="14" text-anchor="middle">RESEARCH WORKER</text>
    <text x="120" y="55" fill="#aaa" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">Queries DDG, Google Search APIs</text>
    <text x="120" y="75" fill="#aaa" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">Fetches Official Developer Docs</text>
  </g>

  <!-- Right Branch: Extraction Agents (LLM Core) -->
  <g transform="translate(660, 230)">
    <rect width="240" height="100" rx="8" fill="#18181f" stroke="#333" stroke-width="1.5" />
    <rect width="240" height="6" rx="3" fill="url(#purple-glow)" />
    <text x="120" y="30" fill="#fff" font-family="system-ui, sans-serif" font-weight="bold" font-size="14" text-anchor="middle">EXTRACTION SUITE</text>
    <text x="120" y="50" fill="#f355da" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">Auth Agent • MCP Agent</text>
    <text x="120" y="70" fill="#8b5cf6" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">Buildability Agent • Blocker Classifier</text>
  </g>

  <!-- Central Validator Gate -->
  <g transform="translate(390, 215)">
    <polygon points="110,0 220,60 110,120 0,60" fill="#1e1b4b" stroke="url(#purple-glow)" stroke-width="2" filter="url(#glow-purple)" />
    <text x="110" y="56" fill="#fff" font-family="system-ui, sans-serif" font-weight="bold" font-size="13" text-anchor="middle">VALIDATION</text>
    <text x="110" y="72" fill="#fff" font-family="system-ui, sans-serif" font-weight="bold" font-size="13" text-anchor="middle">ENGINE</text>
  </g>

  <!-- Bottom: Verification Loop & Output -->
  <g transform="translate(375, 380)">
    <rect width="250" height="80" rx="8" fill="#18181f" stroke="url(#gold-glow)" stroke-width="2" />
    <text x="125" y="30" fill="#fff" font-family="system-ui, sans-serif" font-weight="bold" font-size="15" text-anchor="middle">VERIFICATION AGENT</text>
    <text x="125" y="50" fill="#ffb703" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">Cross-checks with Gold standard</text>
    <text x="125" y="66" fill="#aaa" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">Triggers Human Review if &lt; 90%</text>
  </g>

  <!-- Flow Arrows -->
  <g fill="#555">
    <!-- Arrow down from Planner -->
    <path d="M 500 120 L 495 130 L 505 130 Z" />
    <!-- Arrows to Workers -->
    <path d="M 220 215 L 215 225 L 225 225 Z" />
    <path d="M 780 215 L 775 225 L 785 225 Z" />
    <!-- Arrows from Workers to Validator -->
    <path d="M 340 280 L 390 280" stroke="#555" stroke-width="1.5" />
    <path d="M 390 280 L 382 276 L 382 284 Z" />
    
    <path d="M 660 280 L 610 280" stroke="#555" stroke-width="1.5" />
    <path d="M 610 280 L 618 276 L 618 284 Z" />
    
    <!-- Arrow from Validator to Verification -->
    <path d="M 500 335 L 500 380" stroke="#555" stroke-width="1.5" />
    <path d="M 500 380 L 496 372 L 504 372 Z" />
  </g>
</svg>
